# -----------------------------------------------------------------------
# We don't support docker compose for production environments.
# If you choose to use this type of deployment make sure to
# create you own docker environment file (docker/.env) with your own
# unique random secure passwords and SECRET_KEY.
#
# For verbose logging during development:
# - Set AXBI_LOG_LEVEL=debug in docker/.env-local for detailed AX BI logs
# -----------------------------------------------------------------------
x-ax-bi-user: &ax-bi-user root
x-ax-bi-volumes: &ax-bi-volumes
  # /app/pythonpath_docker will be appended to the PYTHONPATH in the final container
  - ./docker:/app/docker
  - ./axbi:/app/axbi
  - ./ax-bi-core:/app/ax-bi-core
  - ./ax-bi-frontend:/app/ax-bi-frontend
  - axbi_home:/app/axbi_home
  - ./tests:/app/tests
  - axbi_data:/app/data
x-common-build: &common-build
  context: .
  target: ${AXBI_BUILD_TARGET:-dev} # can use `dev` (default) or `lean`
  cache_from:
    - ghcr.io/defai-digital/ax-bi-cache:3.12-slim-trixie
  args:
    DEV_MODE: "true"
    INCLUDE_CHROMIUM: ${INCLUDE_CHROMIUM:-false}
    INCLUDE_FIREFOX: ${INCLUDE_FIREFOX:-false}
    BUILD_TRANSLATIONS: ${BUILD_TRANSLATIONS:-false}

services:
  nginx:
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
    # Wait for the webpack dev server's manifest.json to be served before
    # starting nginx. This prevents 404s on static assets at startup. The
    # probe targets host.docker.internal so it works regardless of whether
    # the dev server runs in the ax-bi-node container
    # (BUILD_AXBI_FRONTEND_IN_DOCKER=true, the default) or directly on
    # the host (BUILD_AXBI_FRONTEND_IN_DOCKER=false).
    command:
      - /bin/bash
      - -c
      - |
        url="http://host.docker.internal:9000/static/assets/manifest.json"
        max_attempts=300  # ~10 minutes at 2s intervals; first build can be slow
        echo "Waiting for webpack dev server at $$url..."
        attempt=0
        until curl -sf --max-time 5 -H "Host: localhost" -o /dev/null "$$url"; do
          attempt=$$((attempt + 1))
          if [ "$$attempt" -ge "$$max_attempts" ]; then
            echo "ERROR: webpack dev server did not serve $$url after $$max_attempts attempts." >&2
            echo "Is the dev server running? With BUILD_AXBI_FRONTEND_IN_DOCKER=false you must start it on the host (e.g. 'npm run dev' in ax-bi-frontend)." >&2
            exit 1
          fi
          if [ $$((attempt % 15)) -eq 0 ]; then
            echo "Still waiting for webpack dev server... ($$attempt/$$max_attempts)"
          fi
          sleep 2
        done
        echo "Webpack dev server is ready; starting nginx."
        exec /docker-entrypoint.sh nginx -g 'daemon off;'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18}
    environment:
      PGDATA: /var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DATABASE_PORT:-5432}:5432"
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axbi} -d ${POSTGRES_DB:-axbi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ax-bi:
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    build:
      <<: *common-build
    command: ["/app/docker/docker-bootstrap.sh", "app"]
    restart: unless-stopped
    ports:
      - ${AXBI_PORT:-8088}:8088
      # When in cypress-mode ->
      - ${CYPRESS_PORT:-8081}:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: *ax-bi-user
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    volumes: *ax-bi-volumes

  ax-bi-websocket:
    build: ./ax-bi-websocket
    ports:
      - ${WEBSOCKET_PORT:-8080}:8080
      - ${WEBSOCKET_HTTP_PORT:-8081}:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    # Mount everything in ax-bi-websocket into container and
    # then exclude node_modules and dist with bogus volume mount.
    # This is necessary because host and container need to have
    # their own, separate versions of these files. .dockerignore
    # does not seem to work when starting the service through
    # docker compose.
    #
    # For example, node_modules may contain libs with native bindings.
    # Those bindings need to be compiled for each OS and the container
    # OS is not necessarily the same as host OS.
    volumes:
      - ./ax-bi-websocket:/home/ax-bi-websocket
      - /home/ax-bi-websocket/node_modules
      - /home/ax-bi-websocket/dist

      # Mount config file. Create your own docker/ax-bi-websocket/config.json
      # for custom settings, then point to it here. Do not use this example in production.
      - ./docker/ax-bi-websocket/config.example.json:/home/ax-bi-websocket/config.json:ro
    environment:
      - PORT=8080
      - HTTP_PORT=8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_SSL=false
      - FAST_CACHE_ENABLED=true

  ax-bi-init:
    build:
      <<: *common-build
    command: ["/app/docker/docker-init.sh"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: *ax-bi-user
    volumes: *ax-bi-volumes
    healthcheck:
      disable: true

  ax-bi-node:
    build:
      context: .
      target: axbi-node
      args:
        # This prevents building the frontend bundle since we'll mount local folder
        # and build it on startup while firing docker-frontend.sh in dev mode, where
        # it'll mount and watch local files and rebuild as you update them
        DEV_MODE: "true"
        BUILD_TRANSLATIONS: ${BUILD_TRANSLATIONS:-false}
    environment:
      # set this to false if you have perf issues running the npm i; npm run dev in-docker
      # if you do so, you have to run this manually on the host, which should perform better!
      BUILD_AXBI_FRONTEND_IN_DOCKER: true
      NPM_RUN_PRUNE: false
      SCARF_ANALYTICS: "${SCARF_ANALYTICS:-}"
      # configuring the dev-server to use the host.docker.internal to connect to the backend
      axbi: "http://ax-bi:8088"
      # Webpack dev server must bind to 0.0.0.0 to be accessible from outside the container
      WEBPACK_DEVSERVER_HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:${NODE_PORT:-9000}:9000"  # exposing the dynamic webpack dev server
    command: ["/app/docker/docker-frontend.sh"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    volumes: *ax-bi-volumes

  ax-bi-worker:
    build:
      <<: *common-build
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    environment:
      CELERYD_CONCURRENCY: 2
    restart: unless-stopped
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    user: *ax-bi-user
    volumes: *ax-bi-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "celery -A axbi.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME"]
    # Bump memory limit if processing selenium / thumbnails on ax-bi-worker
    # mem_limit: 2038m
    # mem_reservation: 128M

  ax-bi-worker-beat:
    build:
      <<: *common-build
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    restart: unless-stopped
    depends_on:
      - ax-bi-worker
    user: *ax-bi-user
    volumes: *ax-bi-volumes
    healthcheck:
      disable: true

  ax-bi-tests-worker:
    build:
      <<: *common-build
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    profiles:
      - optional
    environment:
      DATABASE_HOST: localhost
      DATABASE_DB: test
      REDIS_CELERY_DB: 2
      REDIS_RESULTS_DB: 3
      REDIS_HOST: localhost
      CELERYD_CONCURRENCY: 8
    network_mode: host
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    user: *ax-bi-user
    volumes: *ax-bi-volumes
    healthcheck:
      test: ["CMD-SHELL", "celery inspect ping -A axbi.tasks.celery_app:app -d celery@$$HOSTNAME"]

volumes:
  axbi_home:
    external: false
  db_home:
    external: false
  redis:
    external: false
  axbi_data:
    external: false

# This file is the source of truth for images used in the AxBI docs.
# It is consumed by the docs:screenshots npm script to auto-capture UI screenshots.
#
# To enable screenshot generation for an entry, fill in:
#   app_path  - AxBI app URL path to navigate to (e.g. chart/add)
#              relative, no leading slash; resolved against PLAYWRIGHT_BASE_URL
#   selector  - CSS selector for the element to capture
#              (null = full-page screenshot)
#
# type values: screenshot | tutorial | site-asset | database-logo | badge | external | community
# database-logo, badge, external, community: inventory only, no generation.


# Nested workflows under ax-bi-desktop/.github/ are not executed by GitHub for
# the monorepo. Use the root workflows instead:
#
#   PR / push checks:  .github/workflows/ax-bi-desktop.yml
#   Release + Homebrew: .github/workflows/ax-bi-desktop-release.yml
#
# See ax-bi-desktop/RELEASE.md for Apple signing, minisign, and homebrew-ax-bi.
name: (moved) AX BI Desktop

on:
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Point maintainers at monorepo workflows
        run: |
          echo "This nested workflow is a stub. Run AX BI Desktop Release from"
          echo ".github/workflows/ax-bi-desktop-release.yml (tag ax-bi-desktop-v*)."

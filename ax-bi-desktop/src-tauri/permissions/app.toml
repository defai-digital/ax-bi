[[permission]]
identifier = "allow-app-shell"
description = "Basic launcher shell commands (config, navigation, notifications)."
commands.allow = [
  "get_app_config",
  "navigate_to",
  "show_notification",
  "get_version",
]

[[permission]]
identifier = "allow-local-runtime"
description = "Privileged local Docker runtime control. Grant only to the launcher window."
commands.allow = [
  "get_local_runtime_status",
  "prepare_local_runtime",
  "start_local_runtime",
  "stop_local_runtime",
  "restart_local_runtime",
  "update_local_runtime",
  "get_local_runtime_logs",
  "get_local_admin_credentials",
  "open_local_axbi_window",
  "open_remote_axbi_window",
]

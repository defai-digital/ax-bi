name: Build & publish docker images

on:
  push:
    branches:
      - "master"
      - "main"
      - "[0-9].[0-9]*"
  pull_request:
    branches:
      - "master"
      - "main"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.check.outputs.python }}
      frontend: ${{ steps.check.outputs.frontend }}
      docker: ${{ steps.check.outputs.docker }}
      ax-services: ${{ steps.check.outputs.ax-services }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for file changes
        id: check
        uses: ./.github/actions/change-detector/
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  setup_matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix_config: ${{ steps.set_matrix.outputs.matrix_config }}
    steps:
      - id: set_matrix
        run: |
          MATRIX_CONFIG=$(if [ "${{ github.event_name }}" == "pull_request" ]; then echo '["dev", "lean"]'; else echo '["dev", "lean", "websocket", "dockerize", "py312"]'; fi)
          echo "matrix_config=${MATRIX_CONFIG}" >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT

  docker-build:
    name: docker-build
    needs: [setup_matrix, changes]
    if: >-
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      matrix:
        build_preset: ${{fromJson(needs.setup_matrix.outputs.matrix_config)}}
      fail-fast: false
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_TAG: apache/superset:GHA-${{ matrix.build_preset }}-${{ github.run_id }}
      PUBLISH_DOCKER_IMAGES: ${{ github.repository == 'apache/superset' && github.event_name == 'push' && secrets.DOCKERHUB_USER != '' && secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}

    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free up disk space
        uses: ./.github/actions/free-disk-space

      - name: Setup Docker Environment
        uses: ./.github/actions/setup-docker
        with:
          dockerhub-user: ${{ secrets.DOCKERHUB_USER }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          build: "true"
          login-to-dockerhub: ${{ github.repository == 'apache/superset' && secrets.DOCKERHUB_USER != '' && secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}

      - name: Setup supersetbot
        uses: ./.github/actions/setup-supersetbot/

      - name: Build Docker Image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_PRESET: ${{ matrix.build_preset }}
        run: |
          # Only the upstream Apache repository publishes apache/superset images.
          # Forks still validate the Docker build locally without Docker Hub push credentials.
          if [ "$PUBLISH_DOCKER_IMAGES" = "true" ]; then
            PLATFORM_ARG="--platform linux/arm64 --platform linux/amd64"
            PUSH_OR_LOAD="--push"
          else
            echo "::notice::Validating Docker build locally without publishing to Docker Hub."
            # buildx can only load single-platform images into the local Docker daemon.
            PLATFORM_ARG="--platform linux/amd64"
            PUSH_OR_LOAD="--load"
          fi

          # Retry to absorb transient Docker Hub registry errors (base-image
          # pull timeouts, 504/401 on push, ECONNRESET) and local builder
          # flakiness that otherwise fail the whole job. buildx reuses the
          # buildkit layer cache from the failed attempt, so a retry mostly
          # re-does just the failed operation.
          for attempt in 1 2 3; do
            if supersetbot docker \
              $PUSH_OR_LOAD \
              --preset "$BUILD_PRESET" \
              --context "$EVENT" \
              --context-ref "$RELEASE" $FORCE_LATEST \
              --extra-flags "--build-arg INCLUDE_CHROMIUM=false --build-arg PY_VER=3.12.12-slim-trixie --tag $IMAGE_TAG" \
              $PLATFORM_ARG; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::supersetbot docker build failed after 3 attempts"
              exit 1
            fi
            echo "::warning::Build attempt ${attempt} failed; retrying in 30s..."
            sleep 30
          done

      # in the context of push (using multi-platform build), we need to pull the image locally
      - name: Docker pull
        if: env.PUBLISH_DOCKER_IMAGES == 'true'
        run: |
          for i in 1 2 3; do
            docker pull $IMAGE_TAG && break
            [ $i -lt 3 ] && sleep 30
          done

      - name: Print docker stats
        run: |
          echo "SHA: ${{ github.sha }}"
          echo "IMAGE: $IMAGE_TAG"
          docker images $IMAGE_TAG
          docker history $IMAGE_TAG

      - name: docker-compose sanity check
        if: matrix.build_preset == 'dev'
        shell: bash
        env:
          BUILD_PRESET: ${{ matrix.build_preset }}
        run: |
          export SUPERSET_BUILD_TARGET=$BUILD_PRESET
          # This should reuse the CACHED image built in the previous steps
          docker compose build ax-bi-init --build-arg DEV_MODE=false --build-arg INCLUDE_CHROMIUM=false
          docker compose up ax-bi-init --exit-code-from ax-bi-init

  axbi-compose-config:
    name: axbi-compose-config
    needs: changes
    if: >-
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.ax-services == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate AX-BI Docker Compose config
        shell: bash
        run: |
          {
            echo "COMPOSE_PROJECT_NAME=axbi-ci"
            echo "AX_BI_SECRET_KEY=test-secret-key-for-ci-only"
            echo "DATABASE_PASSWORD=superset"
            echo "ADMIN_PASSWORD=admin"
          } > /tmp/axbi.env
          docker compose --env-file /tmp/axbi.env -f docker-compose-axbi.yml config
          docker compose --env-file /tmp/axbi.env -f docker-compose-axbi.yml -f docker-compose-axbi-build.yml config

  docker-compose-image-tag:
    # Run this job only for upstream Apache pushes. The AX-BI fork publishes
    # fork-owned images via .github/workflows/axbi-docker.yml instead.
    needs: changes
    if: github.repository == 'apache/superset' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free up disk space
        uses: ./.github/actions/free-disk-space
      - name: Setup Docker Environment
        uses: ./.github/actions/setup-docker
        with:
          dockerhub-user: ${{ secrets.DOCKERHUB_USER }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          build: "false"
          install-docker-compose: "true"
      - name: docker-compose sanity check
        shell: bash
        run: |
          docker compose -f docker-compose-image-tag.yml up ax-bi-init --exit-code-from ax-bi-init

name: "Frontend Build CI (unit tests, linting & sanity checks)"

on:
  push:
    branches:
      - "main"
      - "[0-9].[0-9]*"
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]

# cancel previous workflow jobs for PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  TAG: ghcr.io/defai-digital/ax-bi:GHA-${{ github.run_id }}

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      should-run: ${{ steps.check.outputs.frontend_build }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Check for File Changes
        id: check
        uses: ./.github/actions/change-detector/
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        if: steps.check.outputs.frontend_build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "git rev-parse --short HEAD"
          git rev-parse --short HEAD
          echo "git show -s --format=raw HEAD"
          git show -s --format=raw HEAD
          docker buildx build \
            -t $TAG \
            --cache-from=type=registry,ref=ghcr.io/defai-digital/ax-bi-cache:3.12-slim-trixie \
            --target axbi-node-ci \
            .

      - name: Save Docker Image as Artifact
        if: steps.check.outputs.frontend_build
        run: |
          docker save $TAG | zstd -3 --threads=0 > docker-image.tar.zst

      - name: Upload Docker Image Artifact
        if: steps.check.outputs.frontend_build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-image
          path: docker-image.tar.zst

  sharded-jest-tests:
    needs: frontend-build
    if: needs.frontend-build.outputs.should-run == 'true'
    strategy:
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          zstd -d < docker-image.tar.zst | docker load

      - name: npm run test with coverage
        run: |
          mkdir -p ${{ github.workspace }}/ax-bi-frontend/coverage
          docker run \
          -v ${{ github.workspace }}/ax-bi-frontend/coverage:/app/ax-bi-frontend/coverage \
          --rm $TAG \
          bash -c \
          "npm run test -- --coverage --shard=${{ matrix.shard }}/8 --coverageReporters=json"

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-artifacts-${{ matrix.shard }}
          path: ax-bi-frontend/coverage

  report-coverage:
    needs: [frontend-build, sharded-jest-tests]
    if: needs.frontend-build.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Download Coverage Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-artifacts-*
          path: coverage/

      - name: Reorganize test result reports
        run: |
          find coverage/
          for i in {1..8}; do
            mv coverage/coverage-artifacts-${i}/coverage-final.json coverage/coverage-shard-${i}.json
          done
        shell: bash

      - name: Merge Code Coverage
        run: npx nyc merge coverage/ merged-output/coverage-summary.json

      - name: Upload Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          flags: javascript
          use_oidc: true
          verbose: true
          disable_search: true
          files: merged-output/coverage-summary.json
          slug: defai-digital/ax-bi

  lint-frontend:
    needs: frontend-build
    if: needs.frontend-build.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          zstd -d < docker-image.tar.zst | docker load

      - name: lint
        run: |
          docker run --rm $TAG bash -c \
          "npm i && npm run lint"

      - name: tsc
        # The full-app type check carries ~600 pre-existing errors from the
        # TypeScript 6 / antd v6 upgrades; keep it visible without blocking
        # until the type debt is repaid, then drop continue-on-error.
        continue-on-error: true
        run: |
          docker run --rm $TAG bash -c \
          "npm i && npm run plugins:build && npm run type"

  validate-frontend:
    needs: frontend-build
    if: needs.frontend-build.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          zstd -d < docker-image.tar.zst | docker load

      - name: Build Plugins Packages
        run: |
          docker run --rm $TAG bash -c \
          "npm run plugins:build"

  test-storybook:
    needs: frontend-build
    if: needs.frontend-build.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          zstd -d < docker-image.tar.zst | docker load

      - name: Build Storybook and Run Tests
        run: |
          docker run --rm $TAG bash -c \
          "npm run build-storybook && npx playwright install-deps && npx playwright install chromium && npm run test-storybook:ci"

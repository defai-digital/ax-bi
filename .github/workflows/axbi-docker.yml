name: AX-BI Docker Images

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "docker-compose-axbi*.yml"
      - "ax-services/**"
      - "requirements/**"
      - "axbi/**"
      - "ax-bi-core/**"
      - "ax-bi-frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish:
    name: build-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: ax-bi
            context: .
            dockerfile: Dockerfile
            target: lean
          - name: ax-bi-services
            context: ax-services
            dockerfile: ax-services/Dockerfile
            target: runtime
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free up disk space
        uses: ./.github/actions/free-disk-space

      - name: Setup Docker Environment
        uses: ./.github/actions/setup-docker
        with:
          build: "true"
          install-docker-compose: "false"
          login-to-dockerhub: "false"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and publish image
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          IMAGE_CONTEXT: ${{ matrix.image.context }}
          IMAGE_DOCKERFILE: ${{ matrix.image.dockerfile }}
          IMAGE_TARGET: ${{ matrix.image.target }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo%/*}/${IMAGE_NAME}"
          short_sha="${GITHUB_SHA::12}"
          metadata_file="${RUNNER_TEMP}/buildx-${IMAGE_NAME}.json"
          tags=(--tag "${image}:sha-${short_sha}")
          cache_scope="axbi-${IMAGE_NAME}"
          build_mode=(--push --platform linux/amd64,linux/arm64 --sbom=true --provenance=true)
          cache_args=(--cache-from "type=gha,scope=${cache_scope}")

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            build_mode=(--load --platform linux/amd64)
            tags=(--tag "axbi-ci/${IMAGE_NAME}:sha-${short_sha}")
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            tags+=(--tag "${image}:main" --tag "${image}:latest")
            cache_args+=(--cache-to "type=gha,scope=${cache_scope},mode=max")
          fi

          if [ "$GITHUB_EVENT_NAME" != "pull_request" ] && [[ "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=(--tag "${image}:${GITHUB_REF_NAME}" --tag "${image}:${version}" --tag "${image}:latest")
            cache_args+=(--cache-to "type=gha,scope=${cache_scope},mode=max")
          fi

          for attempt in 1 2 3; do
            if docker buildx build \
              "${build_mode[@]}" \
              "${cache_args[@]}" \
              --metadata-file "$metadata_file" \
              --file "$IMAGE_DOCKERFILE" \
              --target "$IMAGE_TARGET" \
              --build-arg DEV_MODE=false \
              --build-arg INCLUDE_CHROMIUM=false \
              --build-arg INCLUDE_FIREFOX=false \
              --build-arg BUILD_TRANSLATIONS=false \
              "${tags[@]}" \
              "$IMAGE_CONTEXT"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::AX-BI image build failed after 3 attempts"
              exit 1
            fi
            echo "::warning::Build attempt ${attempt} failed; retrying in 30s..."
            sleep 30
          done

          cat "$metadata_file"
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            docker buildx imagetools inspect "${image}:sha-${short_sha}"
          fi

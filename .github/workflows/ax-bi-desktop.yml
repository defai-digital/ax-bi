name: AxBI Desktop Checks

on:
  push:
    branches:
      - "main"
      - "[0-9].[0-9]*"
    paths:
      - "ax-bi-desktop/**"
      - ".github/workflows/ax-bi-desktop.yml"
  pull_request:
    paths:
      - "ax-bi-desktop/**"
      - ".github/workflows/ax-bi-desktop.yml"
    types: [synchronize, opened, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ax-bi-desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Assert package / Tauri / Cargo versions match
        run: |
          set -euo pipefail
          pkg="$(node -p "require('./package.json').version")"
          tauri="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo="$(awk -F'"' '/^version = / { print $2; exit }' src-tauri/Cargo.toml)"
          echo "package.json=$pkg tauri.conf.json=$tauri Cargo.toml=$cargo"
          test "$pkg" = "$tauri"
          test "$pkg" = "$cargo"

  node-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ax-bi-desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type

      - name: Release script unit tests
        run: npm run test:release-signing

      - name: Launcher view-state unit tests
        run: node --test src/viewState.test.mjs

  rust-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ax-bi-desktop/src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check Rust formatting
        if: runner.os != 'Windows'
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test

name: AxBI Desktop Checks

on:
  push:
    branches:
      - "main"
      - "[0-9].[0-9]*"
    paths:
      - "ax-bi-desktop/**"
      - ".github/workflows/ax-bi-desktop.yml"
  pull_request:
    paths:
      - "ax-bi-desktop/**"
      - ".github/workflows/ax-bi-desktop.yml"
    types: [synchronize, opened, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  rust-checks:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ax-bi-desktop/src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install 1.85 --profile minimal --component clippy,rustfmt

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test

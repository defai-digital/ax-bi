name: Embedded SDK Release

on:
  push:
    branches:
      - "main"
      - "[0-9].[0-9]*"

permissions:
  contents: read

jobs:
  build:
    # Keep package validation active even before the npm package and its trusted
    # publisher have been bootstrapped.
    if: github.repository == 'defai-digital/ax-bi'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ax-bi-embedded-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "./ax-bi-embedded-sdk/.nvmrc"
      - run: npm ci
      - run: npm test -- --runInBand
      - run: npm run build
      - run: npm pack --dry-run

  publish:
    # Initial publication requires an authenticated npm maintainer. Once the
    # package exists and embedded-sdk-release.yml is configured as its trusted
    # publisher, set the NPM_PUBLISH_ENABLED repository variable to "true".
    needs: build
    if: >-
      github.repository == 'defai-digital/ax-bi' &&
      vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    defaults:
      run:
        working-directory: ax-bi-embedded-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Note: registry-url is intentionally omitted. When set, actions/setup-node
      # writes an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` and a placeholder
      # token, which makes npm attempt token auth and skip the OIDC
      # trusted-publishing exchange. With no .npmrc auth line, npm authenticates
      # via OIDC against the default registry (registry.npmjs.org).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "./ax-bi-embedded-sdk/.nvmrc"
      - run: npm ci
      - run: npm run ci:release

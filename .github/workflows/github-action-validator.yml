name: Validate All GitHub Actions

on:
  push:
    branches:
      - "main"
      - "[0-9].[0-9]*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

# cancel previous workflow jobs for PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test-cached-dependencies-action:
    name: Test cached dependencies action (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    defaults:
      run:
        working-directory: .github/actions/axbi-cached-dependencies
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/actions/axbi-cached-dependencies/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build action bundles
        run: npm run build

      - name: Verify committed bundles
        run: git diff --exit-code -- dist

  validate-all-ghas:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install Dependencies
        # zizmor: ignore[adhoc-packages] - action-validator is installed only to statically validate workflow files.
        run: npm install -g @action-validator/core @action-validator/cli --save-dev

      - name: Run Script
        run: bash .github/workflows/github-action-validator.sh

      - name: Check for security issues on GHA workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Scope this root validator to root workflows/actions. Nested apps may
          # carry their own workflow policy and release cadence.
          inputs: .github
          # Run zizmor as a blocking check without requiring code scanning/GHAS
          # support for SARIF upload in forks.
          advanced-security: false

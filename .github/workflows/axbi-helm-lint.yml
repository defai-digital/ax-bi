name: "Helm: lint and test charts"

on:
  push:
    branches:
      - "main"
      - "master"
    paths:
      - "helm/**"
  pull_request:
    types: [opened, edited, reopened, synchronize]
    paths:
      - "helm/**"

permissions:
  contents: read

# cancel previous workflow jobs for PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.4

      - name: Setup Python
        uses: ./.github/actions/setup-backend/
        with:
          install-axbi: "false"

      - name: Set up chart-testing
        uses: ./.github/actions/chart-testing-action

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed  --print-config)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        env:
          CT_CHART_DIRS: helm
          CT_SINCE: HEAD

      - name: Run chart-testing (lint)
        run: ct lint --print-config
        env:
          CT_CHART_DIRS: helm
          CT_LINT_CONF: lintconf.yaml
          CT_SINCE: HEAD
          CT_CHART_REPOS: bitnami=https://charts.bitnami.com/bitnami

      - name: Render AX-BI Helm values
        run: |
          helm dependency build helm/ax-bi
          helm lint helm/ax-bi -f helm/ax-bi/values-axbi.yaml
          helm template ax-bi helm/ax-bi -f helm/ax-bi/values-axbi.yaml > /tmp/ax-bi-rendered.yaml
          grep -q "name: ax-bi-mcp" /tmp/ax-bi-rendered.yaml
          grep -q "name: ax-bi-services" /tmp/ax-bi-rendered.yaml
          grep -Eq 'image: "?ghcr.io/defai-digital/ax-bi:' /tmp/ax-bi-rendered.yaml
          grep -Eq 'image: "?ghcr.io/defai-digital/ax-bi-services:' /tmp/ax-bi-rendered.yaml
          if grep -Eq "image: .*:latest" /tmp/ax-bi-rendered.yaml; then
            echo "::error::AX-BI Helm values must render pinned image tags, not latest"
            exit 1
          fi

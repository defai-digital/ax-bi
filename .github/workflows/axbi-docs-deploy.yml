name: Docs Build Artifact

on:
  # Rebuild docs after integration tests produce fresh database diagnostics.
  # zizmor: ignore[dangerous-triggers] - untrusted workflow runs are rejected by the job condition.
  workflow_run:
    workflows: ["Python-Integration"]
    types: [completed]
    branches: [main]

  push:
    paths:
      - "docs/**"
      - "README.md"
    branches:
      - "main"

  workflow_dispatch: {}

concurrency:
  group: docs-build-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout ${{ github.event.workflow_run.head_sha || github.sha }}"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "./docs/.nvmrc"

      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --check-cache

      - name: Download database diagnostics
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        continue-on-error: true
        with:
          workflow: axbi-python-integrationtest.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: database-diagnostics
          path: docs/src/data/

      - name: Use database diagnostics when available
        working-directory: docs
        run: |
          if [ -f "src/data/databases-diagnostics.json" ]; then
            mv src/data/databases-diagnostics.json src/data/databases.json
          fi

      - name: Build docs
        working-directory: docs
        run: yarn build

      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: axbi-docs-${{ github.event.workflow_run.head_sha || github.sha }}
          path: docs/build
          if-no-files-found: error
          retention-days: 14

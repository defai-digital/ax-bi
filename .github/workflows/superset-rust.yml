name: Superset Rust Checks

on:
  push:
    branches:
      - "master"
      - "main"
      - "[0-9].[0-9]*"
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      superset-rust: ${{ steps.check.outputs.superset-rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for file changes
        id: check
        uses: ./.github/actions/change-detector/
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  rust-checks:
    needs: changes
    if: needs.changes.outputs.superset-rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check Rust formatting
        run: cargo fmt --manifest-path superset-rust/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path superset-rust/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path superset-rust/Cargo.toml

      - name: Install maturin
        run: python -m pip install "maturin>=1.12,<2"

      - name: Build Python extension wheel
        working-directory: superset-rust/python
        run: maturin build --interpreter python

      - name: Install Python extension wheel
        run: python -m pip install superset-rust/target/wheels/ax_sql-*.whl

      - name: Generate SQL kernel benchmark artifact
        run: >
          python superset-rust/python/benchmark_sql_kernel.py
          --iterations 10000
          --output superset-rust/target/sql-kernel-benchmark.json

      - name: Upload SQL kernel benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sql-kernel-benchmark
          path: superset-rust/target/sql-kernel-benchmark.json

  superset-rust-required:
    needs: [changes, rust-checks]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check superset-rust result
        env:
          CHANGES: ${{ needs.changes.result }}
          RESULT: ${{ needs.rust-checks.result }}
        run: |
          if [ "$CHANGES" != "success" ]; then
            echo "change detection did not succeed (result: $CHANGES); refusing to pass on a skipped check"
            exit 1
          fi
          if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
            echo "superset-rust did not pass (result: $RESULT)"
            exit 1
          fi
          echo "superset-rust result: $RESULT (changes: $CHANGES)"

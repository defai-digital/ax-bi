name: Free disk space
description: Reclaim unused hosted-runner toolchains before Docker-heavy jobs.

runs:
  using: composite
  steps:
    - name: Remove unused hosted-runner toolchains
      shell: bash
      run: |
        # Docker image builds and compose sanity checks can otherwise exhaust
        # the runner's root disk when registry/cache reuse is unavailable.
        echo "Disk before cleanup:"
        df -h /
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/local/.ghcup \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/share/boost || true
        echo "Disk after cleanup:"
        df -h /

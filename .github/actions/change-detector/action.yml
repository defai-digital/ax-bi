name: Change Detector
description: Detects file changes for pull request and push events
inputs:
  token:
    description: GitHub token for authentication
    required: true
outputs:
  python:
    description: Whether Python-related files were changed
    value: ${{ steps.change-detector.outputs.python }}
  frontend:
    description: Whether frontend-related files were changed
    value: ${{ steps.change-detector.outputs.frontend }}
  frontend_build:
    description: Whether frontend package build-related files were changed
    value: ${{ steps.change-detector.outputs.frontend_build }}
  docker:
    description: Whether docker-related files were changed
    value: ${{ steps.change-detector.outputs.docker }}
  docs:
    description: Whether docs-related files were changed
    value: ${{ steps.change-detector.outputs.docs }}
  ax-services:
    description: Whether ax-services package-related files were changed
    value: ${{ steps.change-detector.outputs.ax-services }}
  ax-sdk:
    description: Whether AX SDK package-related files were changed
    value: ${{ steps.change-detector.outputs.ax-sdk }}
  ax-bi-rust:
    description: Whether ax-bi-rust package-related files were changed
    value: ${{ steps.change-detector.outputs.ax-bi-rust }}
  ax-bi-extensions-cli:
    description: Whether ax-bi-extensions-cli package-related files were changed
    value: ${{ steps.change-detector.outputs.ax-bi-extensions-cli }}
runs:
  using: composite
  steps:
    - name: Detect file changes
      id: change-detector
      run: |
        python --version
        python scripts/change_detector.py
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}

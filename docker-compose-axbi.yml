x-axbi-image: &axbi-image ${AXBI_IMAGE:-ghcr.io/defai-digital/ax-bi:latest}
x-axbi-services-image: &axbi-services-image ${AX_SERVICES_IMAGE:-ghcr.io/defai-digital/ax-bi-services:latest}

x-axbi-env: &axbi-env
  AXBI_CONFIG_PATH: /app/docker/pythonpath_axbi/axbi_config.py
  AXBI_ENV: production
  AXBI_LOAD_EXAMPLES: ${AXBI_LOAD_EXAMPLES:-no}
  AXBI_LOG_LEVEL: ${AXBI_LOG_LEVEL:-info}
  AX_BI_SECRET_KEY: ${AX_BI_SECRET_KEY:?Set AX_BI_SECRET_KEY in docker/.env-axbi}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in docker/.env-axbi}
  DATABASE_DIALECT: ${DATABASE_DIALECT:-postgresql}
  DATABASE_HOST: ${DATABASE_HOST:-db}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_DB: ${DATABASE_DB:-axbi}
  DATABASE_USER: ${DATABASE_USER:-axbi}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in docker/.env-axbi}
  UPLOAD_FOLDER: ${UPLOAD_FOLDER:-/app/axbi_home/uploads}
  LOCAL_DB_NAME: ${LOCAL_DB_NAME:-Local Files}
  LOCAL_DB_PATH: ${LOCAL_DB_PATH:-/app/axbi_home/uploads/local_files.duckdb}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  ENABLE_PROXY_FIX: ${ENABLE_PROXY_FIX:-true}
  MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-false}
  MCP_DEV_USERNAME: ${MCP_DEV_USERNAME:-}
  MCP_JWT_ISSUER: ${MCP_JWT_ISSUER:-}
  MCP_JWT_AUDIENCE: ${MCP_JWT_AUDIENCE:-}
  MCP_JWKS_URI: ${MCP_JWKS_URI:-}
  MCP_REQUIRED_SCOPES: ${MCP_REQUIRED_SCOPES:-}
  GENAI_SEMANTIC_INDEX: ${GENAI_SEMANTIC_INDEX:-false}
  GENAI_SEMANTIC_INDEX_PGVECTOR: ${GENAI_SEMANTIC_INDEX_PGVECTOR:-false}
  AI_SEMANTIC_EMBEDDING_PROVIDER: ${AI_SEMANTIC_EMBEDDING_PROVIDER:-ax_engine_http}
  AI_SEMANTIC_EMBEDDING_ENDPOINT: ${AI_SEMANTIC_EMBEDDING_ENDPOINT:-http://host.docker.internal:8099/embed}
  AI_SEMANTIC_EMBEDDING_MODEL: ${AI_SEMANTIC_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
  AI_SEMANTIC_EMBEDDING_DIMENSIONS: ${AI_SEMANTIC_EMBEDDING_DIMENSIONS:-1024}

services:
  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18}
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${POSTGRES_DB:-axbi}
      POSTGRES_USER: ${POSTGRES_USER:-axbi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in docker/.env-axbi}
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-axbi} -d ${POSTGRES_DB:-axbi}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ax-bi-init:
    image: *axbi-image
    command: ["/app/docker/docker-init.sh"]
    environment: *axbi-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - axbi_home:/app/axbi_home
    healthcheck:
      disable: true

  ax-bi:
    image: *axbi-image
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    restart: unless-stopped
    ports:
      - "${AXBI_PORT:-31423}:31423"
    environment: *axbi-env
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    volumes:
      - axbi_home:/app/axbi_home
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/docker/docker-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ax-bi-worker:
    image: *axbi-image
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    restart: unless-stopped
    environment: *axbi-env
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    volumes:
      - axbi_home:/app/axbi_home
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A axbi.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  ax-bi-worker-beat:
    image: *axbi-image
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    restart: unless-stopped
    environment: *axbi-env
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    volumes:
      - axbi_home:/app/axbi_home
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/celerybeat-schedule || test -f /tmp/celerybeat.pid",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  mcp:
    image: *axbi-image
    command: ["/app/docker/docker-bootstrap.sh", "mcp"]
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-31421}:31421"
    environment:
      <<: *axbi-env
      MCP_PORT: 31421
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    volumes:
      - axbi_home:/app/axbi_home
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 31421), 5).close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  ax-services:
    image: *axbi-services-image
    restart: unless-stopped
    environment:
      AX_SERVICES_HOST: 0.0.0.0
      AX_SERVICES_PORT: 31424
      AXBI_BASE_URL: http://ax-bi:31423
      AX_SERVICES_LOG_LEVEL: ${AX_SERVICES_LOG_LEVEL:-info}
    ports:
      - "${AX_SERVICES_PORT:-31424}:31424"
    depends_on:
      ax-bi:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

volumes:
  axbi_home:
    external: false
  db_home:
    external: false
  redis:
    external: false

apiVersion: v2
appVersion: "6.1.0"
description: AX-BI is a GenAI-native business intelligence platform built on Apache Superset
name: ax-bi
icon: https://raw.githubusercontent.com/defai-digital/ax-bi/main/docs/static/img/logo.svg
home: https://github.com/defai-digital/ax-bi
keywords:
  - business intelligence
  - data science
  - genai
  - mcp
sources:
  - https://github.com/defai-digital/ax-bi
maintainers:
  - name: DEFAI Private Limited
    url: https://github.com/defai-digital
version: 0.17.3 # See [README](https://github.com/defai-digital/ax-bi/blob/main/helm/superset/README.md#versioning) for version details.
dependencies:
  - name: postgresql
    version: 18.7.10
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: 17.9.4
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled

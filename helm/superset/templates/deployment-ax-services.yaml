{{- if .Values.axServices.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "superset.fullname" . }}-services
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "superset.name" . }}-services
    chart: {{ template "superset.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    {{- if .Values.extraLabels }}
      {{- toYaml .Values.extraLabels | nindent 4 }}
    {{- end }}
    {{- if .Values.axServices.deploymentLabels }}
      {{- toYaml .Values.axServices.deploymentLabels | nindent 4 }}
    {{- end }}
  {{- if .Values.axServices.deploymentAnnotations }}
  annotations: {{- toYaml .Values.axServices.deploymentAnnotations | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.axServices.replicaCount }}
  selector:
    matchLabels:
    {{- include "axbiServices.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/axServicesEnv: {{ .Values.axServices.env | toYaml | sha256sum }}
        {{- if .Values.axServices.podAnnotations }}
          {{- toYaml .Values.axServices.podAnnotations | nindent 8 }}
        {{- end }}
      labels:
        app: {{ template "superset.name" . }}-services
        release: {{ .Release.Name }}
        {{- if .Values.extraLabels }}
          {{- toYaml .Values.extraLabels | nindent 8 }}
        {{- end }}
        {{- if .Values.axServices.podLabels }}
          {{- toYaml .Values.axServices.podLabels | nindent 8 }}
        {{- end }}
    spec:
      {{- if or (.Values.serviceAccount.create) (.Values.serviceAccountName) }}
      serviceAccountName: {{ template "superset.serviceAccountName" . }}
      {{- end }}
      {{- if .Values.axServices.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.axServices.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.axServices.initContainers }}
      initContainers: {{- tpl (toYaml .Values.axServices.initContainers) . | nindent 6 }}
      {{- end }}
      containers:
        - name: ax-services
          image: "{{ .Values.axServices.image.repository }}:{{ .Values.axServices.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.axServices.image.pullPolicy }}
          {{- if .Values.axServices.containerSecurityContext }}
          securityContext: {{- toYaml .Values.axServices.containerSecurityContext | nindent 12 }}
          {{- end }}
          env:
            - name: AX_SUPERSET_BASE_URL
              value: "http://{{ template "superset.fullname" . }}:{{ .Values.service.port }}"
            {{- range $key, $value := .Values.axServices.env }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.axServices.envRaw }}
              {{- toYaml .Values.axServices.envRaw | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.axServices.service.port }}
              protocol: TCP
          {{- if .Values.axServices.startupProbe }}
          startupProbe: {{- .Values.axServices.startupProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.axServices.readinessProbe }}
          readinessProbe: {{- .Values.axServices.readinessProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.axServices.livenessProbe }}
          livenessProbe: {{- .Values.axServices.livenessProbe | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- if .Values.axServices.resources }}
              {{- toYaml .Values.axServices.resources | nindent 12 }}
            {{- else }}
              {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
      {{- if or .Values.affinity .Values.axServices.affinity }}
      affinity:
        {{- with .Values.affinity }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.axServices.affinity }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if or .Values.topologySpreadConstraints .Values.axServices.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- with .Values.topologySpreadConstraints }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.axServices.topologySpreadConstraints }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.axServices.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
{{- end }}

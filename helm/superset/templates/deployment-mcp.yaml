{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "superset.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "superset.name" . }}-mcp
    chart: {{ template "superset.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    {{- if .Values.extraLabels }}
      {{- toYaml .Values.extraLabels | nindent 4 }}
    {{- end }}
    {{- if .Values.mcp.deploymentLabels }}
      {{- toYaml .Values.mcp.deploymentLabels | nindent 4 }}
    {{- end }}
  {{- if .Values.mcp.deploymentAnnotations }}
  annotations: {{- toYaml .Values.mcp.deploymentAnnotations | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
    {{- include "axbiMcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/superset_config.py: {{ include "superset-config" . | sha256sum }}
        checksum/superset_bootstrap.sh: {{ tpl .Values.bootstrapScript . | sha256sum }}
        checksum/connections: {{ .Values.supersetNode.connections | toYaml | sha256sum }}
        checksum/extraSecretEnv: {{ .Values.extraSecretEnv | toYaml | sha256sum }}
        checksum/configOverrides: {{ .Values.configOverrides | toYaml | sha256sum }}
        {{- if .Values.mcp.podAnnotations }}
          {{- toYaml .Values.mcp.podAnnotations | nindent 8 }}
        {{- end }}
      labels:
        app: {{ template "superset.name" . }}-mcp
        release: {{ .Release.Name }}
        {{- if .Values.extraLabels }}
          {{- toYaml .Values.extraLabels | nindent 8 }}
        {{- end }}
        {{- if .Values.mcp.podLabels }}
          {{- toYaml .Values.mcp.podLabels | nindent 8 }}
        {{- end }}
    spec:
      {{- if or (.Values.serviceAccount.create) (.Values.serviceAccountName) }}
      serviceAccountName: {{ template "superset.serviceAccountName" . }}
      {{- end }}
      securityContext:
        runAsUser: {{ .Values.runAsUser }}
        {{- if .Values.mcp.podSecurityContext }}
          {{- toYaml .Values.mcp.podSecurityContext | nindent 8 }}
        {{- end }}
      {{- if .Values.mcp.initContainers }}
      initContainers: {{- tpl (toYaml .Values.mcp.initContainers) . | nindent 6 }}
      {{- end }}
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.mcp.containerSecurityContext }}
          securityContext: {{- toYaml .Values.mcp.containerSecurityContext | nindent 12 }}
          {{- end }}
          command: {{ tpl (toJson .Values.mcp.command) . }}
          env:
            - name: MCP_PORT
              value: {{ .Values.mcp.service.port | quote }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.mcp.env }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.extraEnvRaw }}
              {{- toYaml .Values.extraEnvRaw | nindent 12 }}
            {{- end }}
            {{- if .Values.mcp.envRaw }}
              {{- toYaml .Values.mcp.envRaw | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ tpl .Values.envFromSecret . | quote }}
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ tpl . $ | quote }}
            {{- end }}
          volumeMounts:
            - name: superset-config
              mountPath: {{ .Values.configMountPath | quote }}
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
              {{- tpl (toYaml .) $ | nindent 12 -}}
            {{- end }}
          ports:
            - name: mcp
              containerPort: {{ .Values.mcp.service.port }}
              protocol: TCP
          {{- if .Values.mcp.startupProbe }}
          startupProbe: {{- .Values.mcp.startupProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.mcp.readinessProbe }}
          readinessProbe: {{- .Values.mcp.readinessProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.mcp.livenessProbe }}
          livenessProbe: {{- .Values.mcp.livenessProbe | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- if .Values.mcp.resources }}
              {{- toYaml .Values.mcp.resources | nindent 12 }}
            {{- else }}
              {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
      {{- if or .Values.affinity .Values.mcp.affinity }}
      affinity:
        {{- with .Values.affinity }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.mcp.affinity }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if or .Values.topologySpreadConstraints .Values.mcp.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- with .Values.topologySpreadConstraints }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.mcp.topologySpreadConstraints }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      volumes:
        - name: superset-config
          secret:
            secretName: {{ tpl .Values.configFromSecret . }}
        {{- with .Values.extraVolumes }}
          {{- tpl (toYaml .) $ | nindent 8 -}}
        {{- end }}
{{- end }}

# AX BI opinionated values for Kubernetes deployments.
#
# This file configures the independently maintained AX BI images and services.
# Override all CHANGE_ME values before using it outside a local cluster.

nameOverride: ax-bi
runAsUser: 1000

extraLabels:
  app.kubernetes.io/part-of: ax-bi

image:
  repository: ghcr.io/defai-digital/ax-bi
  tag: ~
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi

extraEnv:
  AXBI_ENV: production
  ENABLE_PROXY_FIX: "true"
  GENAI_BI: "true"
  GENAI_SEMANTIC_INDEX: "false"
  GENAI_SEMANTIC_INDEX_PGVECTOR: "false"
  MCP_AUTH_ENABLED: "false"
  MCP_DEV_USERNAME: ""
  MCP_JWT_ISSUER: ""
  MCP_JWT_AUDIENCE: ""
  MCP_JWKS_URI: ""
  MCP_REQUIRED_SCOPES: ""
  AI_SEMANTIC_EMBEDDING_PROVIDER: ax_engine_http
  AI_SEMANTIC_EMBEDDING_ENDPOINT: http://host.docker.internal:8099/embed
  AI_SEMANTIC_EMBEDDING_MODEL: Qwen/Qwen3-Embedding-0.6B
  AI_SEMANTIC_EMBEDDING_DIMENSIONS: "1024"

extraSecretEnv:
  AX_BI_SECRET_KEY: CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_42

configOverrides:
  axbi: |
    import os

    FEATURE_FLAGS = {
        **globals().get("FEATURE_FLAGS", {}),
        "ALERT_REPORTS": True,
        "DATASET_FOLDERS": True,
        "ENABLE_EXTENSIONS": True,
        "GENAI_BI": os.getenv("GENAI_BI", "true").lower() == "true",
        "GENAI_SEMANTIC_INDEX": os.getenv("GENAI_SEMANTIC_INDEX", "false").lower() == "true",
        "GENAI_SEMANTIC_INDEX_PGVECTOR": os.getenv("GENAI_SEMANTIC_INDEX_PGVECTOR", "false").lower() == "true",
        "SEMANTIC_LAYERS": True,
    }

    MCP_AUTH_ENABLED = os.getenv("MCP_AUTH_ENABLED", "false").lower() == "true"
    MCP_DEV_USERNAME = os.getenv("MCP_DEV_USERNAME") or None
    MCP_JWT_ISSUER = os.getenv("MCP_JWT_ISSUER") or None
    MCP_JWT_AUDIENCE = os.getenv("MCP_JWT_AUDIENCE") or None
    MCP_JWT_ALGORITHM = os.getenv("MCP_JWT_ALGORITHM", "RS256")
    MCP_JWKS_URI = os.getenv("MCP_JWKS_URI") or None
    MCP_JWT_PUBLIC_KEY = os.getenv("MCP_JWT_PUBLIC_KEY") or None
    MCP_JWT_SECRET = os.getenv("MCP_JWT_SECRET") or None
    MCP_REQUIRED_SCOPES = [
        scope.strip()
        for scope in os.getenv("MCP_REQUIRED_SCOPES", "").split(",")
        if scope.strip()
    ]

mcp:
  enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

axServices:
  enabled: true
  image:
    repository: ghcr.io/defai-digital/ax-bi-services
    tag: ~
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

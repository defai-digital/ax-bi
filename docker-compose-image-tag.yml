# -----------------------------------------------------------------------
# We don't support docker compose for production environments.
# If you choose to use this type of deployment make sure to
# create you own docker environment file (docker/.env) with your own
# unique random secure passwords and SECRET_KEY.
#
# For verbose logging during development:
# - Set SUPERSET_LOG_LEVEL=debug in docker/.env-local for detailed AX BI logs
# -----------------------------------------------------------------------
x-ax-bi-image: &ax-bi-image apachesuperset.docker.scarf.sh/apache/superset:${TAG:-latest-dev}
x-ax-bi-volumes:
  &ax-bi-volumes # /app/pythonpath_docker will be appended to the PYTHONPATH in the final container
  - ./docker:/app/docker
  - ./superset-core:/app/superset-core
  - superset_home:/app/superset_home

services:
  redis:
    image: redis:7
    container_name: ax_bi_cache
    restart: unless-stopped
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18}
    container_name: ax_bi_db
    environment:
      PGDATA: /var/lib/postgresql/data
    restart: unless-stopped
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superset} -d ${POSTGRES_DB:-superset}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ax-bi:
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    image: *ax-bi-image
    container_name: ax_bi_app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    user: "1000"
    restart: unless-stopped
    ports:
      - 8088:8088
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    volumes: *ax-bi-volumes
    healthcheck:
      test: ["CMD", "/app/docker/docker-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ax-bi-init:
    image: *ax-bi-image
    container_name: ax_bi_init
    command: ["/app/docker/docker-init.sh"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: "1000"
    volumes: *ax-bi-volumes
    healthcheck:
      disable: true

  ax-bi-worker:
    image: *ax-bi-image
    container_name: ax_bi_worker
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    restart: unless-stopped
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    user: "1000"
    volumes: *ax-bi-volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  ax-bi-worker-beat:
    image: *ax-bi-image
    container_name: ax_bi_worker_beat
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    restart: unless-stopped
    depends_on:
      ax-bi-init:
        condition: service_completed_successfully
    user: "1000"
    volumes: *ax-bi-volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/celerybeat-schedule || test -f /tmp/celerybeat.pid",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  superset_home:
    external: false
  db_home:
    external: false
  redis:
    external: false
